<script>
    function handleTrack() {
        const num = document.getElementById('trackNum').value.trim().toUpperCase();
        
        if(num === "") {
            alert("Please enter a Tracking ID.");
        } 
        // THE UPDATED TEST CASE
        else if(num === "ISFI-99") {
            alert("✅ SHIPMENT LOCATED\n\n" +
                  "ID: ISFI-99\n" +
                  "Route: Tel Aviv 🇮🇱 → Helsinki 🇫🇮\n" +
                  "Status: IN TRANSIT 🚚✈️\n" +
                  "Location: Ben Gurion International Airport\n\n" +
                  "Contact Swiftgo on WhatsApp for your official PDF Waybill.");
        } 
        // ALL OTHER NUMBERS
        else {
            alert("TRACKING UPDATE:\n\nID: " + num + "\nStatus: System Updating.\n\nPlease click the Live Chat button for real-time GPS coordinates.");
        }
    }

    function handleQuote() {
        alert("Quote Request Received! Our team will contact you via WhatsApp shortly.");
    }
</script>
